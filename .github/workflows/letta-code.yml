name: Letta Code

# This workflow provides two surfaces for the persistent Letta Code
# agent on this repository:
#
#   1. letta-conversational  - mention-driven. Wakes the agent when
#      someone @-mentions @letta-code, labels an issue/PR with
#      `letta-code`, or replies in an issue/PR comment thread the
#      agent has already joined.
#
#   2. letta-inline-review   - auto-driven. On every non-draft PR
#      lifecycle event, fetches the diff, asks the agent for inline
#      findings under a strict JSON schema, validates the anchors,
#      and posts a single PR review with line-anchored comments.
#
# Both jobs share the same LETTA_AGENT_ID so the agent's long-term
# memory and the repository's learned conventions stay consistent
# across surfaces. The conversational action uses LETTA_MODEL exactly
# as letta-code-action expects it. The inline review shim uses
# LETTA_INLINE_MODEL when set, otherwise `lc-minimax/MiniMax-M3`.
# The inline shim passes this value to Letta as override_model, so it
# must be a full Letta model handle; `auto` and bare model names are
# rejected by the Letta API.
#
# See .github/prompts/letta-inline-review.system.md for the review
# contract and .github/scripts/letta-inline-review.mjs for the
# posting implementation.

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled]
  pull_request_review_comment:
    types: [created]

# One concurrency group per PR keeps the conversational and inline
# jobs from fighting each other on rapid pushes.
concurrency:
  group: letta-code-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  letta-conversational:
    if: |
      github.event_name != 'pull_request'
      || github.event.action == 'labeled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: letta-ai/letta-code-action@v0
        with:
          letta_api_key: ${{ secrets.LETTA_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          agent_id: ${{ vars.LETTA_AGENT_ID }}
          model: ${{ vars.LETTA_MODEL }}
          letta_args: --agent ${{ vars.LETTA_AGENT_ID }}

  letta-inline-review:
    if: |
      github.event_name == 'pull_request'
      && github.event.action != 'labeled'
      && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Inline review
        env:
          LETTA_API_KEY: ${{ secrets.LETTA_API_KEY }}
          LETTA_AGENT_ID: ${{ vars.LETTA_AGENT_ID }}
          LETTA_MODEL: ${{ vars.LETTA_INLINE_MODEL || 'lc-minimax/MiniMax-M3' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          DRY_RUN: ${{ vars.LETTA_INLINE_DRY_RUN || 'false' }}
          MAX_FINDINGS: '20'
        run: node .github/scripts/letta-inline-review.mjs
