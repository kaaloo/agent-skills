name: Letta Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: letta-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: letta-ai/letta-code-action@v0
        with:
          letta_api_key: ${{ secrets.LETTA_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          agent_id: ${{ vars.LETTA_AGENT_ID }}
          model: ${{ vars.LETTA_MODEL }}
          letta_args: --agent ${{ vars.LETTA_AGENT_ID }}
          prompt: |
            Review this pull request for correctness bugs, security issues,
            behavioral regressions, and missing tests. Because this repository
            publishes Agent Skills, also check that changed skills follow the
            repository guidance: valid SKILL.md frontmatter, required fields,
            descriptions that clearly state when to use the skill, and no
            unnecessary large content in the main skill file.

            Publish the review outcome on the pull request with the GitHub CLI;
            do not rely on your final assistant response or the GitHub Actions
            step summary as the user-facing review. Use $GITHUB_REPOSITORY and
            $GITHUB_PR_NUMBER when posting comments.

            If there are no material issues, post exactly one concise PR comment
            saying that Letta Code reviewed the pull request and found no
            material issues. Include the reviewed commit SHA.

            If there are material issues, post one PR comment per issue, similar
            in spirit to Gemini Code Assist: include a short severity label, a
            concrete file/line reference when possible, why the issue matters,
            and a specific fix direction. Focus only on actionable findings
            introduced by this PR. Do not post comments for praise, summaries,
            or non-material observations.
