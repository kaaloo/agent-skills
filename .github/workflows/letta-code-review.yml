name: Letta Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: letta-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: letta-ai/letta-code-action@v0
        with:
          letta_api_key: ${{ secrets.LETTA_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          agent_id: ${{ vars.LETTA_AGENT_ID }}
          model: ${{ vars.LETTA_MODEL }}
          prompt: |
            Review this pull request for correctness bugs, security issues,
            behavioral regressions, and missing tests. Because this repository
            publishes Agent Skills, also check that changed skills follow the
            repository guidance: valid SKILL.md frontmatter, required fields,
            descriptions that clearly state when to use the skill, and no
            unnecessary large content in the main skill file. Focus only on
            actionable findings introduced by this PR. Be concise, cite concrete
            files or lines when possible, and avoid commenting when there is no
            material issue to raise.
